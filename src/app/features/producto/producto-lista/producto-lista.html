<div class="container ">

<div class="container text-center" style="margin: 30px;">
<h3>Sistema de Inventarios</h3>
</div>
<div class="table-responsive">
<table class="table table-striped table-hover align-middle">
  <thead>
    <tr>
      <th scope="col">Descripcion del Producto</th>
      <th scope="col">Precio de Compra</th>
      <th scope="col">Precio de Venta</th>
      <th scope="col">Existencias</th>
      <th scope="col" class="text-center">Acciones</th>
    </tr>
  </thead>
  <tbody>
      
 <tr  *ngFor="let producto of productos">
    
      <td >{{producto.descripcion}}</td>
      <td>{{producto.precioCompra}}</td>
      <td>{{producto.precioVenta}}</td>
      <td>{{producto.stock}}</td>
      <td class="text-center">
      <div>
        <button (click)="editarProducto(producto.idProducto)"
        class="btn btn-warning btn-sm me-3">Editar</button>
        <button (click)="eliminarProducto(producto.idProducto)"
        class="btn btn-danger btn-sm me-3">Eliminar</button>
      </div>
      </td>
         
    </tr>
       <tr>
        <td colspan="7" class="text-center ">
          <button routerLink="/agregar-producto" class="btn btn-success">Agregar Producto</button>
        </td>
      </tr>
    
     
   
  
  </tbody>
</table>
</div>
</div>
