<div class="container ">

<div class="container text-center" style="margin: 30px;">
<h3>Proveedores</h3>
</div>
<div class="table-responsive">
<table class="table table-striped table-hover align-middle">
  <thead>
    <tr>
      <th scope="col">Nombre</th>
      <th scope="col">Apellidos</th>
      <th scope="col">Direccion</th>
      <th scope="col">telefono</th>
      <th scope="col">E-mail</th>
      <th scope="col" class="text-center">Acciones</th>
    </tr>
  </thead>
  <tbody>
      
 <tr  *ngFor="let proveedor of proveedores">

      <td >{{proveedor.nombre}}</td>
      <td>{{proveedor.apellido}}</td>
      <td>{{proveedor.direccion}}</td>
      <td>{{proveedor.telefono}}</td>
      <td>{{proveedor.email}}</td>
      <td class="text-center">
      <div>
        <button (click)="editarProveedor(proveedor.id)"
        class="btn btn-warning btn-sm me-3">Editar</button>
        <button (click)="eliminarProveedor(proveedor.id)"
        class="btn btn-danger btn-sm me-3">Eliminar</button>
      </div>
      </td>
    </tr>
    <tr>
        <td colspan="7" class="text-center ">
          <button routerLink="/agregar-proveedor" class="btn btn-success">Agregar Proveedor</button>
        </td>
      </tr>
     
   
  
  </tbody>
</table>
</div>
</div>
