<div class="container ">

<div class="container text-center" style="margin: 30px;">
<h3>Clientes</h3>
</div>
<div class="table-responsive">
<table class="table table-striped table-hover align-middle">
  <thead>
    <tr>
      <th scope="col">Nombre</th>
      <th scope="col">Apellidos</th>
      <th scope="col" >telefono</th>
      <th scope="col">E-mail</th>
      <th scope="col" class="text-center">Acciones</th>
    </tr>
  </thead>
  <tbody>
      
 <tr  *ngFor="let cliente of clientes">

      <td >{{cliente.nombre}}</td>
      <td>{{cliente.apellido}}</td>
      <td>{{cliente.telefono}}</td>
      <td>{{cliente.email}}</td>
      <td class="text-center">
      <div>
        <button (click)="editarCliente(cliente.idCliente)"
        class="btn btn-warning btn-sm me-3">Editar</button>
        <button (click)="eliminarCliente(cliente.idCliente)"
        class="btn btn-danger btn-sm me-3">Eliminar</button>
      </div>
      </td>
    </tr>
    <tr>
        <td colspan="7" class="text-center ">
          <button routerLink="/agregar-cliente" class="btn btn-success">Agregar cliente</button>
        </td>
      </tr>
   
  
  </tbody>
</table>
     </div>

</div>
