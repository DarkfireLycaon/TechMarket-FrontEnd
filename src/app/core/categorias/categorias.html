<div class="row" *ngIf="!loading">
  <div class="col-md-3 col-sm-6 mb-4" *ngFor="let producto of productos">
    <div class="card h-100 shadow-sm">
      
 <div class="card-img-top bg-dark position-relative d-flex align-items-center justify-content-center" 
     [routerLink]="['/producto', producto.idProducto]" 
     style="cursor: pointer; height: 200px; overflow: hidden;">
     
    @if (producto.imagenUrl || producto.imagen) {
        <img [src]="generarUrlImagen(producto.imagenUrl || producto.imagen)" 
             [alt]="producto.nombre"
             class="img-fluid h-100 w-100"
             style="object-fit: cover;">
    } @else {
        <i [class]="getCategoriaInfo().icono" 
           style="font-size: 4rem; color: #ffffff;">
        </i>
    }
</div>

      <div class="card-body">
        <h5 class="card-title" 
            [routerLink]="['/producto', producto.idProducto]" 
            style="cursor: pointer; color: var(--accent-primary);">
          {{ producto.nombre }}
        </h5>
        
        <p class="card-text text-muted">{{ producto.marca }}</p>
        <p class="card-text small">{{ producto.descripcion | slice:0:80 }}...</p>
        
        <div class="d-flex justify-content-between align-items-center mt-3">
          <h4 class="text-primary mb-0">${{ producto.precioVenta }}</h4>
          <span class="badge" [ngClass]="producto.stock > 0 ? 'bg-success' : 'bg-danger'">
            Stock: {{ producto.stock }}
          </span>
        </div>
      </div>

      <div class="card-footer bg-transparent border-0">
        <button class="btn btn-primary w-100" 
                (click)="agregarAlCarrito(producto.idProducto)"
                [disabled]="producto.stock === 0">
          <i class="fas fa-cart-plus me-2"></i>
          {{ producto.stock > 0 ? 'Agregar al Carrito' : 'Agotado' }}
        </button>
      </div>
    </div>
  </div>
</div>
