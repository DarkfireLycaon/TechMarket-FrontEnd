<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow border-0" style="max-width: 400px; width: 100%;">
    <div class="text-center mb-4">
      <i class="bi bi-envelope-at text-primary" style="font-size: 3rem;"></i>
      <h3 class="fw-bold mt-2">Recuperar acceso</h3>
      <p class="text-muted small">Ingresa tu correo para recibir un enlace de restauración.</p>
    </div>

    <form [formGroup]="olvideForm" (ngSubmit)="enviarEnlace()">
      <div class="mb-3">
        <label class="form-label small fw-bold">Correo electrónico</label>
        <input type="email" formControlName="email" class="form-control"
               placeholder="ejemplo@correo.com"
               [ngClass]="{'is-invalid': olvideForm.get('email')?.touched && olvideForm.get('email')?.invalid}">
      </div>

      <button type="submit" [disabled]="olvideForm.invalid" class="btn btn-primary w-100 py-2">
        Enviar instrucciones
      </button>

      <div class="text-center mt-3">
        <a routerLink="/login" class="text-decoration-none small">Volver al inicio de sesión</a>
      </div>
    </form>
  </div>
</div>
