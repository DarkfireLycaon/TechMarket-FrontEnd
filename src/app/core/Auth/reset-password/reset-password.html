<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow-lg border-0" style="max-width: 400px; width: 100%; border-radius: 15px;">
    
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill text-success" style="font-size: 3.5rem;"></i>
      <h3 class="fw-bold mt-3">Nueva Contraseña</h3>
      <p class="text-muted small">Casi terminamos. Elige una contraseña segura que no hayas usado antes.</p>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onReset()">
      <div class="mb-3">
        <label class="form-label small fw-bold text-secondary">Nueva Contraseña</label>
        <input type="password" formControlName="password" class="form-control shadow-sm"
               placeholder="Mínimo 6 caracteres"
               [ngClass]="{'is-invalid': resetForm.get('password')?.touched && resetForm.get('password')?.invalid}">
        <div class="invalid-feedback">La contraseña debe tener al menos 6 caracteres.</div>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-bold text-secondary">Confirmar Contraseña</label>
        <input type="password" formControlName="confirmPassword" class="form-control shadow-sm"
               placeholder="Repite tu contraseña"
               [ngClass]="{'is-invalid': resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched}">
        <div class="invalid-feedback" *ngIf="resetForm.hasError('mismatch')">
          Las contraseñas no coinciden.
        </div>
      </div>

      <button type="submit" [disabled]="resetForm.invalid" class="btn btn-success w-100 py-2 shadow-sm fw-bold">
        Actualizar Contraseña
      </button>
    </form>
  </div>
</div>
