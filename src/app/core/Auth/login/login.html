<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg" style="width: 25rem; border-radius: 15px;">
    <div class="card-body p-5">
      <h2 class="text-center mb-4 fw-bold text-primary">Stock Master</h2>
      <p class="text-center text-muted mb-4">Ingresa tus credenciales</p>
     <div class="login-container">
  <div *ngIf="cuentaActivada" class="alert alert-success">
    ¡Cuenta confirmada! Ya puedes iniciar sesión.
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
    <div class="mb-3">
      <label>Correo Electrónico</label>
      <input type="email" formControlName="email" class="form-control"
             [ngClass]="{'is-invalid': f['email'].touched && f['email'].errors}">
    </div>

    <div class="mb-3">
      <label>Contraseña</label>
      <input type="password" formControlName="password" class="form-control"
             [ngClass]="{'is-invalid': f['password'].touched && f['password'].errors}">
    </div>

    <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid">
      Ingresar
    </button>
    <div class="d-flex justify-content-between align-items-center mt-3 px-1">
  <p class="mb-0 small">
    ¿No tienes cuenta? 
    <a routerLink="/registrar" class="fw-bold text-decoration-none hover-link">Regístrate</a>
  </p>
  <p class="mb-0 small">
    <a routerLink="/olvide" class=" text-decoration-none hover-link">¿Olvidaste tu contraseña?</a>
  </p>
</div>
  </form>
</div>
</div>
