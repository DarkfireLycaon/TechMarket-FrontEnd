<section class="services-section">
  <h2>Nuestros Servicios</h2>
  <div class="services-grid">
    <div class="service-card" *ngFor="let service of servicios">

<i class="fas {{ service.icon }}"></i>
      <h3>{{ service.title }}</h3>
      <p>{{ service.description }}</p>
    </div>
  </div>
</section>
