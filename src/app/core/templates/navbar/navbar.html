<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
  <div class="container">
    <a class="navbar-brand" routerLink="/">
      <i class="fas fa-store me-2"></i>
      <strong>TechMarket</strong>
    </a>

    <button class="navbar-toggler" type="button" (click)="toggleMenu()">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" [ngClass]="{'show': isMenuOpen}">
      
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" routerLink="/">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" routerLink="/ofertas">Ofertas</a></li>
        <li class="nav-item"><a class="nav-link" routerLink="/servicios-techmarket">Servicios</a></li>
      </ul>

      <div class="mx-auto w-50">
        <div class="input-group">
          <input type="text" class="form-control search-input" placeholder="Buscar..." 
                 [(ngModel)]="searchTerm" (keyup.enter)="buscarProductos()">
          <button class="btn btn-light" (click)="buscarProductos()"><i class="fas fa-search"></i></button>
        </div>
      </div>

      <ul class="navbar-nav ms-auto">
        
        <li class="nav-item dropdown" *ngIf="user() as u">
          <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" role="button">
            <i class="fas fa-user-circle"></i> {{ u.nombre }}
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" routerLink="/perfil">Mi Perfil</a></li>
            <li><a class="dropdown-item" routerLink="/mis-pedidos">Mis Pedidos</a></li>
            <li><hr class="dropdown-divider"></li>
            <li *ngIf="authService.isAdmin()">
              <a class="dropdown-item" routerLink="/admin">Panel Admin</a>
            </li>
            <li><a class="dropdown-item text-danger" (click)="logout()">Cerrar Sesión</a></li>
          </ul>
        </li>

        <ng-container *ngIf="!user()">
          <li class="nav-item"><a class="nav-link" routerLink="/login">Login</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/registro">Registro</a></li>
        </ng-container>

        <li class="nav-item">
           <a class="nav-link position-relative" (click)="irAlCarrito()" style="cursor: pointer;">
             <i class="fas fa-shopping-cart"></i>
             <span class="badge bg-danger rounded-pill" *ngIf="carritoItems > 0">
               {{ carritoItems }}
             </span>
           </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
