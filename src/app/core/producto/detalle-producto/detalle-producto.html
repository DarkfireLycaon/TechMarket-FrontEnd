@if (producto) {
  <div class="container py-5">
    <div class="row">
      <div class="col-md-6">
        
        @if (producto.imagenUrl || producto.imagen) {
          <img [src]="producto.imagenUrl || producto.imagen" 
               [alt]="producto.nombre"
               class="img-fluid rounded shadow"
               style="max-height: 500px; width: 100%; object-fit: cover;">
        } @else {
          <div class="bg-light d-flex align-items-center justify-content-center rounded shadow text-muted" 
               style="height: 400px; width: 100%;">
            <div class="text-center">
              <i class="bi bi-image" style="font-size: 4rem;"></i>
              <p class="mt-2">Sin imagen disponible</p>
            </div>
          </div>
        }
      
      </div>
      <div class="col-md-6">
        <h1 class="fw-bold">{{ producto.nombre }}</h1>
        
        <h3 class="text-primary">{{ (producto.precio || producto.precioVenta) | currency:'EUR' }}</h3>
        
        <p class="mt-4 text-muted">{{ producto.descripcion }}</p>
        
        <div class="mt-4">
        <button 
          class="btn btn-primary w-100" 
          (click)="agregarAlCarrito(producto.idProducto)"
          [disabled]="producto.stock === 0">
          <i class="fas fa-cart-plus me-2"></i>
          {{ producto.stock > 0 ? 'Agregar al Carrito' : 'Agotado' }}
        </button>
        </div>
      </div>
    </div>
  </div>
} @else {
  <div class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p>Cargando producto...</p>
  </div>
}
