@if (producto) {
  <div class="container py-5">
    <div class="row">
      <div class="col-md-6">
        <img [src]="producto.imagen || 'assets/placeholder.jpg'" class="img-fluid rounded shadow" alt="Producto">
      </div>
      <div class="col-md-6">
        <h1 class="fw-bold">{{ producto.nombre }}</h1>
        <h3 class="text-primary">{{ producto.precio | currency:'EUR' }}</h3>
        <p class="mt-4 text-muted">{{ producto.descripcion }}</p>
        
        <div class="mt-4">
          <button class="btn btn-lg btn-success px-5">
            <i class="bi bi-cart-plus"></i> Añadir al Carrito
          </button>
        </div>
      </div>
    </div>
  </div>
} @else {
  <div class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p>Cargando producto...</p>
  </div>
}
